services:
  - type: web
    name: bidiq-api
    env: node
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bidiq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://bidiq-frontend.onrender.com

databases:
  - name: bidiq-db
    databaseName: bidiq
    user: bidiq
